name: Speek
options:
  bundleIdPrefix: com.tylersimmons
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    from: 1.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
targets:
  Speek:
    type: application
    platform: macOS
    sources:
      - path: Speek
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: DynamicNotchKit
        product: DynamicNotchKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Speek/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: Speek transcribes your dictation locally on this Mac.
        NSAppleEventsUsageDescription: Speek pauses your music while you dictate and resumes it afterward.
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleName: Speek
        CFBundleDisplayName: Speek
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "2"
        SUFeedURL: https://raw.githubusercontent.com/TylerSimmons212/Speek/main/appcast.xml
        SUPublicEDKey: qEWeFK8yNh0gb7jhHr+b/dGZsFgfeanZpzEYLmkOkDM=
        SUEnableAutomaticChecks: true
    entitlements:
      path: Speek/Resources/Speek.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
  SpeekTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpeekTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Speek
